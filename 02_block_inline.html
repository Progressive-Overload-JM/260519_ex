<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Block Inline</title>
    <style>
      div {
        background-color: rosybrown;
        width: 150px;
        height: 50px;
        margin: 15px;
        /*가로 마진만 적용*/
        padding: 15px;
      }
      span {
        display: inline;
        background-color: greenyellow;
        width: 150px;
        height: 50px;
        margin: 15px;
        padding: 15px;
      }
      .block {
        display: block;
      }
      .inline {
        display: inline;
      }
      .inline-block {
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div>b1</div>
    <div>b2</div>
    <span>i1</span>
    <span>i2</span>
    <div class="inline">a1</div>
    <div class="block">a2</div>
    <div class="inline-block">a3</div>
    <div class="inline-block">a4</div>
    <img src="" alt="" />
  </body>
</html>
